<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="user-select: none; -webkit-app-region: drag;">
  <h1>Electron Js Hello World!</h1>
  <h2>This is App!</h2>
  <br><br><br>
  <input type="range" style="-webkit-app-region:none;"/>
    <br><br><br>
  
  <button onclick="zoomIn()">ZoomIn</button>
  <button onclick="zoomOut()">ZoomOut</button>

  <br><br>

  <button onclick="sendMsg()">Send Message</button>
</body>
<script>
  const { webFrame, ipcRenderer } = require("electron");
  function zoomIn() {
    webFrame.setZoomFactor(webFrame.getZoomFactor() + 0.1);
  }
  function zoomOut() {
    webFrame.setZoomFactor(webFrame.getZoomFactor() - 0.1);
  }

  function sendMsg() {
    ipcRenderer.send("msg", "Hello from the renderer process!");
    ipcRenderer.on("msg", (event, arg) => {
      console.log(arg);
    });
  }
</script>
</html>
